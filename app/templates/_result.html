{# Final result fragment. Replaces the polling element; no further requests. #}
<div class="result-panel">
  <p class="frag frag--ok">
    <sl-icon name="check-circle"></sl-icon>
    Done — language <strong style="color:var(--on-surface)">{{ language or "?" }}</strong>,
    {% if diarized %}speakers labelled{% else %}no diarization{% endif %}.
  </p>
  <div class="downloads">
    <button class="dl" type="button"
            onclick="(window.openTranscriptModal||function(id){location.href='/sessions/'+id+'/view';})('{{ job_id }}')">
      <sl-icon name="journal-text"></sl-icon> Open Transcript
    </button>
    {% for fmt in formats %}
      <a class="dl" hx-boost="false" href="/sessions/{{ job_id }}/download/{{ fmt }}">{{ fmt }}</a>
    {% endfor %}
  </div>
</div>
