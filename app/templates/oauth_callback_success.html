    --on-primary: #fbf9f4;

    --serif: 'Literata', Georgia, 'Times New Roman', serif;
    --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;

    --radius-sm: 2px;
    --radius: 4px;
    --radius-md: 6px;
    --radius-lg: 8px;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--surface);
    color: var(--on-surface);
    font-family: var(--serif);
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  body, body * { font-kerning: normal; }

  /* faint archival rule pattern at top, like a colophon page */
  .stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
  }

  .cb {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  /* wordmark */
  .cb__brand { display: flex; align-items: center; gap: 13px; }
  .cb__logo {
    width: 40px; height: 40px; flex: 0 0 40px;
    display: flex; align-items: center; justify-content: center;
  }
  .cb__logo svg { width: 100%; height: 100%; display: block; }
  .cb__name { font-size: 23px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; }

  .cb__rule { width: 56px; height: 1px; background: var(--outline-variant); margin: 38px 0 0; }

  /* success check badge — mirrors onboarding "done" */
  .cb__check {
    width: 72px; height: 72px;
    border-radius: var(--radius-md);
    background: var(--primary);
    color: var(--on-primary);
    display: flex; align-items: center; justify-content: center;
    margin-top: 40px;
    position: relative;
  }
  .cb__check svg { width: 34px; height: 34px; }
  /* concentric pulse ring (decorative only) */
  .cb__check::after {
    content: "";
    position: absolute;
    inset: -1px;
    border-radius: var(--radius-md);
    border: 1px solid var(--primary);
    opacity: 0;
  }

  /* Entrance animation is an enhancement only — visible state above is the base. */
  @media (prefers-reduced-motion: no-preference) {
    .cb__check { animation: badgeIn 0.55s cubic-bezier(.34,1.4,.5,1) both; }
    .cb__check svg polyline {
      stroke-dasharray: 36;
      stroke-dashoffset: 36;
      animation: draw 0.5s ease 0.3s forwards;
    }
    .cb__check::after { animation: ring 1.6s ease 0.5s 1 forwards; }
  }
  @keyframes badgeIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  @keyframes draw { to { stroke-dashoffset: 0; } }
  @keyframes ring { 0% { inset: -1px; opacity: 0.5; } 100% { inset: -18px; opacity: 0; } }

  .cb__kicker {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--on-surface-variant);
    margin-top: 30px;
  }
  .cb__title {
    font-size: 38px;
    font-weight: 700;
    letter-spacing: -0.025em;
    line-height: 1.08;
    margin-top: 16px;
  }
  .cb__lede {
    font-size: 18px;
    line-height: 1.55;
    color: var(--on-surface-variant);
    margin-top: 18px;
    max-width: 420px;
  }

  /* connection detail card */
  .cb__detail {
    width: 100%;
    margin-top: 36px;
    border: 1px solid var(--outline-variant);
    border-radius: var(--radius);
    background: var(--surface-container-low);
    padding: 4px 24px;
    text-align: left;
  }
  .cb__row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 15px 0;
    border-bottom: 1px solid var(--outline-soft);
  }
  .cb__row:last-child { border-bottom: 0; }
  .cb__k {
    display: flex; align-items: center; gap: 12px;
    font-family: var(--mono); font-size: 12px;
    letter-spacing: 0.04em;
    color: var(--on-surface-variant);
  }
  .cb__k svg { width: 16px; height: 16px; flex: 0 0 16px; color: var(--on-surface-faint); }
  .cb__v {
    font-family: var(--mono); font-size: 13px; font-weight: 500;
    color: var(--on-surface);
    display: flex; align-items: center; gap: 9px;
  }
  .cb__dot { width: 7px; height: 7px; border-radius: 50%; background: var(--primary); }

  /* actions */
  .cb__actions {
    display: flex; align-items: center; gap: 14px;
    margin-top: 34px;
  }
  .btn-primary {
    display: inline-flex; align-items: center; gap: 11px;
    font-family: var(--mono); font-size: 14px; font-weight: 600;
    background: var(--primary); color: var(--on-primary);
    border: none; border-radius: var(--radius);
    padding: 15px 26px; cursor: pointer; white-space: nowrap;
  }
  .btn-primary svg { width: 15px; height: 15px; flex: 0 0 15px; }
  .cb__note {
    font-family: var(--mono); font-size: 12px;
    color: var(--on-surface-faint);
    margin-top: 22px;
    letter-spacing: 0.01em;
  }
  .cb__note b { color: var(--on-surface-variant); font-weight: 600; }

  /* footer colophon */
  .colophon {
    flex: 0 0 auto;
    border-top: 1px solid var(--outline-soft);
    padding: 22px 32px;
    display: flex; align-items: center; justify-content: space-between;
    font-family: var(--mono); font-size: 11px;
    color: var(--on-surface-faint);
    letter-spacing: 0.04em;
  }
  .colophon span { white-space: nowrap; }

  @media (max-width: 560px) {
    .cb__title { font-size: 30px; }
    .colophon { flex-direction: column; gap: 8px; text-align: center; }
  }
</style>
</head>

      var n = 5;
      var countEl = document.getElementById('count');
      var noteEl = countEl ? countEl.closest('.cb__note') : null;
      var timer = setInterval(function () {
        n -= 1;
        if (n <= 0) {
          clearInterval(timer);
          if (noteEl) noteEl.innerHTML = 'You can close this tab now.';
          window.close();
          return;
        }
        if (countEl) countEl.textContent = n;
      }, 1000);
      var btn = document.getElementById('closeBtn');
      if (btn) btn.addEventListener('click', function () {
        clearInterval(timer);
        window.close();
        if (noteEl) noteEl.innerHTML = 'You can close this tab now.';
      });
    })();
