<!doctype html>
<!-- Splash shown while the embedded Python/Flask server boots. The Rust shell
     (src/main.rs) creates the window on this local page, then navigates it to
     http://127.0.0.1:<port>/ once /healthz returns 200. This file is NOT the app
     UI — the real UI is served by Flask.

     Design: "Loading Screen" option A · Parchment, from the Claude Design handoff
     (SplashParchment). Borderless macOS launch window — parchment + charcoal ink,
     Literata wordmark, JetBrains Mono tag, a quiet shimmer bar as progress. Fonts
     load from Google Fonts when network is up and degrade to Georgia / system mono
     offline (the splash is brief; the real UI self-hosts the fonts). -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Manuscript</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Literata:ital,opsz,wght@0,7..72,400;0,7..72,500;0,7..72,600;0,7..72,700;1,7..72,500;1,7..72,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        --serif: 'Literata', Georgia, 'Times New Roman', serif;
        --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
      }
      html, body { margin: 0; height: 100%; }

      /* Desktop backdrop — sells the borderless floating launch window. */
      .sp-stage {
        width: 100%; height: 100%;
        display: flex; align-items: center; justify-content: center;
        position: relative; overflow: hidden;
        background: radial-gradient(135% 125% at 50% 20%, #cfcabd 0%, #b8b1a2 68%, #a59e8e 100%);
      }
      .sp-stage::after {
        content: ""; position: absolute; inset: 0; pointer-events: none;
        box-shadow: inset 0 0 170px rgba(58,52,40,0.24);
      }

      /* Borderless light window shell. */
      .sp-win {
        position: relative; width: 384px; height: 304px;
        border-radius: 16px; -webkit-font-smoothing: antialiased;
        background: linear-gradient(180deg, #fdfcf8 0%, #f4f1e9 100%);
        border: 1px solid rgba(40,38,32,0.10);
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,0.72),
          0 36px 72px -26px rgba(38,34,26,0.55),
          0 12px 28px -16px rgba(38,34,26,0.38);
      }
      .sp-sheen {
        position: absolute; left: 0; right: 0; top: 0; height: 54%;
        border-radius: 16px 16px 0 0; pointer-events: none;
        background: radial-gradient(120% 92% at 50% 0%, rgba(255,255,255,0.7), rgba(255,255,255,0) 72%);
      }

      .sp-hero {
        position: absolute; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; padding-bottom: 26px;
      }
      .sp-mark { line-height: 0; }
      .sp-wordmark {
        font-family: var(--serif); font-weight: 700; letter-spacing: -0.02em;
        line-height: 1; font-size: 27px; color: #1b1c19; margin-top: 22px;
      }
      .sp-tag {
        font-family: var(--mono); text-transform: uppercase; line-height: 1;
        white-space: nowrap; letter-spacing: 0.18em;
        font-size: 10px; color: #9a988f; margin-top: 9px;
      }

      .sp-foot {
        position: absolute; left: 0; right: 0; bottom: 30px;
        display: flex; flex-direction: column; align-items: center; gap: 13px;
      }
      .sp-foot .sp-tag {
        font-size: 9.5px; color: #b0aea4; letter-spacing: 0.14em; margin-top: 0;
      }

      /* Quiet shimmer progress bar. */
      .sp-track {
        position: relative; width: 196px; height: 2px;
        border-radius: 2px; overflow: hidden; background: rgba(34,32,26,0.12);
      }
      .sp-shimmer {
        position: absolute; top: 0; left: 0; height: 100%; width: 38%; border-radius: 2px;
        background: linear-gradient(90deg, rgba(34,32,26,0) 0%, rgba(34,32,26,0.5) 50%, rgba(34,32,26,0) 100%);
        animation: sp-sweep 1.95s cubic-bezier(.5,0,.5,1) infinite;
      }
      @keyframes sp-sweep { 0% { transform: translateX(-115%); } 100% { transform: translateX(380%); } }

      /* Slow breath on the mark. */
      .sp-breathe { animation: sp-breathe 3.4s ease-in-out infinite; }
      @keyframes sp-breathe { 0%, 100% { opacity: 0.9; } 50% { opacity: 1; } }

      @media (prefers-reduced-motion: reduce) {
        .sp-shimmer { animation: none; left: 31%; }
        .sp-breathe { animation: none; opacity: 1; }
      }
    </style>
  </head>
